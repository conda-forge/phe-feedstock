{% set name = "phe" %}
{% set version = "1.5.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/phe-{{ version }}.tar.gz
  sha256: 992fb7091d2427f0d9733946f8f350acdd4d1d012057f2aad364ba79f970339c

build:
  number: 1
  noarch: python
  entry_points:
    - pheutil = phe.command_line:cli
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }}

test:
  imports:
    - phe
    - phe.tests
  commands:
    - pip check
    - pheutil --help
  requires:
    - pip
    - click
    - gmpy2
    - numpy
    - python {{ python_min }}

about:
  home: https://github.com/data61/python-paillier
  license: GPL-3.0-only AND Apache-2.0
  license_family: GPL3
  license_file: LICENSE.txt
  summary: Partially Homomorphic Encryption library for Python
  doc_url: https://python-paillier.readthedocs.io/en/stable
  dev_url: https://github.com/data61/python-paillier

extra:
  recipe-maintainers:
    - wilko77
